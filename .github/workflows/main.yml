name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'
jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: v0.3.5
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}                  # 如 yourname@gmail.com
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}  # App Password
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}        # smtp.gmail.com
          SMTP_PORT: ${{ secrets.SMTP_PORT }}            # 现在是 587
          ARXIV_QUERY: cs.AI+cs.CV+cs.LG
        run: |
          uv run main.py
