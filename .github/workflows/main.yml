name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'
jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: v0.3.5
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}     # 可选，如果想用 LLM
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}   # 可选
          ARXIV_QUERY: cs.AI+cs.CV+cs.LG                    # ← 旧版关键配置！
          # 如果有其他如 SMTP_SERVER 等，按旧 README 加
        run: |
          uv run main.py   # 或 uv run src/zotero_arxiv_daily/main.py，根据实际路径
